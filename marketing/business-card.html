<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>AstroPulse — визитка</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 340px;
      height: 189px;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: #f7f2ff;
      background: #0b0618;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .card {
      position: relative;
      width: 340px;
      height: 189px;
      overflow: hidden;
      padding: 16px 18px;
      background:
        radial-gradient(circle at 12% 18%, rgba(167, 139, 250, 0.32), transparent 34%),
        radial-gradient(circle at 88% 22%, rgba(56, 189, 248, 0.16), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(124, 58, 237, 0.18), transparent 40%),
        linear-gradient(155deg, #120824 0%, #1a0f33 55%, #0d0820 100%);
    }

    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.5;
      background-image:
        radial-gradient(1px 1px at 28px 24px, #fff, transparent),
        radial-gradient(1px 1px at 72px 12px, #fff, transparent),
        radial-gradient(1px 1px at 118px 34px, #fff, transparent),
        radial-gradient(1px 1px at 260px 18px, #fff, transparent),
        radial-gradient(1px 1px at 300px 42px, #fff, transparent),
        radial-gradient(1px 1px at 48px 150px, #fff, transparent),
        radial-gradient(1px 1px at 290px 148px, #fff, transparent);
    }

    .glow-ring {
      position: absolute;
      top: -24px;
      right: -24px;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 12px;
      height: 100%;
    }

    .main {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c4b5fd;
    }

    .brand-mark { font-size: 16px; line-height: 1; }

    .eyebrow {
      display: inline-block;
      margin-top: 8px;
      padding: 3px 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ddd6fe;
      background: rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin-top: 8px;
      font-size: 21px;
      line-height: 1;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 24px rgba(167, 139, 250, 0.25);
    }

    .services {
      margin-top: 8px;
      font-size: 8px;
      line-height: 1.35;
      color: #ddd6fe;
    }

    .bottom {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bot-link {
      font-size: 11px;
      font-weight: 700;
      color: #fde68a;
    }

    .url {
      font-size: 8px;
      color: #a78bfa;
    }

    .qr-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .qr-frame {
      padding: 5px;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.28);
    }

    .qr-frame img {
      display: block;
      width: 72px;
      height: 72px;
    }

    .scan-label {
      margin-top: 5px;
      text-align: center;
      font-size: 7px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c4b5fd;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="stars"></div>
    <div class="glow-ring"></div>
    <div class="content">
      <div class="main">
        <div>
          <div class="brand">
            <span class="brand-mark">🌌</span>
            <span>AstroPulse</span>
          </div>
          <div class="eyebrow">Telegram-бот</div>
          <h1>Карманный<br>астролог</h1>
          <p class="services">🪐 Гороскоп · 🌙 Луна · ✨ Натальная карта · 💫 Совместимость</p>
        </div>
        <div class="bottom">
          <div class="bot-link">@AstroPulsee_bot</div>
          <div class="url">t.me/AstroPulsee_bot</div>
        </div>
      </div>
      <div class="qr-col">
        <div class="qr-frame">
          <img src="qr-code.png" alt="QR-код AstroPulse">
        </div>
        <div class="scan-label">Сканируйте</div>
      </div>
    </div>
  </div>
</body>
</html>
